media:
  - name: uploads
    label: Uploads
    input: public/uploads
    output: ../uploads
    categories: [image, document]

content:
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    filename: "{slug}.md"
    format: yaml-frontmatter
    subfolders: true
    exclude:
      - "**/.DS_Store"
      - "**/*.docx"
    view:
      fields: [title, slug, pubDate]
      primary: title
      sort: [pubDate, title]
      search: [title, metaTitle, description, excerpt, tags]
      layout: tree
      default:
        search: ""
        sort: pubDate
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: metaTitle
        label: Meta title
        type: string
        description: Optional override for the browser title and social title.
      - name: slug
        label: Slug
        type: string
        required: true
        description: File slug used in the URL and filename, for example `why-seo-is-important-for-business`.
      - name: description
        label: Description
        type: text
        required: true
      - name: excerpt
        label: Excerpt
        type: text
        required: true
      - name: image
        label: Featured image path
        type: string
        description: Relative path from the post folder, for example `./cover.webp`.
      - name: imageAlt
        label: Featured image alt text
        type: string
      - name: pubDate
        label: Publish date
        type: date
        required: true
      - name: updatedDate
        label: Updated date
        type: date
      - name: tags
        label: Tags
        type: string
        list: true
      - name: body
        label: Content
        type: code
        options:
          language: markdown

settings:
  content:
    merge: true
